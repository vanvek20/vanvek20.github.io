<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "FAQPage",
  "mainEntity": [
    {
      "@type": "Question",
      "name": "Как формируется цена?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Цены фиксированные и указаны на сайте до выезда мастера. Стоимость складывается из базовой услуги плюс дополнительные работы, которые вы выбрали при оформлении заявки. После приезда мастера цена не меняется."
      }
    },
    {
      "@type": "Question",
      "name": "Можно ли заказать без звонка?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Да, именно для этого и создан сайт. Выберите услуги, оформите заявку на сайте — мы сами свяжемся с вами для подтверждения."
      }
    },
    {
      "@type": "Question",
      "name": "Какова гарантия на работы?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "1 год на все виды работ. Если в течение гарантийного срока возникнет неисправность по вине мастера — устраним бесплатно."
      }
    },
    {
      "@type": "Question",
      "name": "Как быстро приедет мастер?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "При заказе до 14:00 — в день обращения. В остальных случаях — на следующий день или в удобное для вас время."
      }
    },
    {
      "@type": "Question",
      "name": "Нужна ли предоплата?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Нет. Оплата производится после выполнения всех работ. Мы принимаем наличные и банковские карты."
      }
    },
    {
      "@type": "Question",
      "name": "Работаете ли вы в выходные?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Да, ежедневно с 9:00 до 20:00, включая праздничные дни."
      }
    },
    {
      "@type": "Question",
      "name": "Вывозите ли старое оборудование?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Да, за дополнительную плату. При заказе \"Демонтаж старого оборудования\" мастер вывезет и утилизирует старую сантехнику."
      }
    },
    {
      "@type": "Question",
      "name": "Есть ли доплата за поздний выезд?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Выезд мастера после 19:00 — доплата +10% к стоимости работ."
      }
    },
    {
      "@type": "Question",
      "name": "Работаете ли по всей Москве?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Выезжаем по всей Москве и Московской области. Стоимость выезда включена в цену услуги."
      }
    }
  ]
}
</script>

const PAGE_KEY = 'faq';
document.addEventListener('DOMContentLoaded', function() {

  document.getElementById('header-mount').innerHTML = getHeaderHTML(meta ? meta.navKey : '');
  // Хедер вставлен — инициализируем переключатель города
  if (window.AppStore && window.AppStore.initCityDropdown) window.AppStore.initCityDropdown();
  if (window.AppStore && window.AppStore.initThemeToggle) window.AppStore.initThemeToggle();
  if (window.AppStore && window.AppStore.updateCartUI) window.AppStore.updateCartUI();
  document.getElementById('footer-mount').innerHTML = getFooterHTML();

  var fabRoot = document.getElementById('messenger-fab-root');

});

<script>
document.addEventListener('DOMContentLoaded', function() {
  var form = document.getElementById('task-form');
  if (!form) return;
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('task-submit-btn');
    var name = form.querySelector('[name="name"]').value.trim();
    var phone = form.querySelector('[name="phone"]').value.trim();
    var task = form.querySelector('[name="task"]').value.trim();
    if (!name || !phone || !task) return;
    btn.disabled = true;
    btn.textContent = 'Отправка...';
    var reqNum = 'TASK-' + Date.now().toString(36).toUpperCase();
    fetch('https://formsubmit.co/ajax/sc.vanvek@gmail.com', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        _subject: 'Новая задача ' + reqNum + ' — VanVek',
        'Заявка': reqNum,
        'Имя': name,
        'Телефон': phone,
        'Описание задачи': task,
        _template: 'table'
      })
    })
    .then(function(res) { return res.json(); })
    .then(function() {
      form.style.display = 'none';
      document.getElementById('task-success').style.display = 'block';
    })
    .catch(function() {
      alert('Ошибка отправки. Позвоните нам: 8 800 333-33-33');
      btn.disabled = false;
      btn.textContent = 'Отправить';
    });
  });
});
</script>

<script>
document.addEventListener('DOMContentLoaded', function() {
  function updateMobileBar() {
    if (!window.AppStore) return;
    var count = window.AppStore.cartCount();
    document.querySelectorAll('.mobile-bottom-bar .js-cart-count').forEach(function(el) {
      el.textContent = count;
      el.style.display = count > 0 ? '' : 'none';
    });
  }
  if (window.AppStore) {
    window.AppStore.onCartChange(updateMobileBar);
    setTimeout(updateMobileBar, 100);
  }
});
</script>
