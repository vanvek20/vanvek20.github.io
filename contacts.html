const PAGE_KEY = 'contacts';
document.addEventListener('DOMContentLoaded', function() {

  if (window.AppStore && window.AppStore.initCityDropdown) window.AppStore.initCityDropdown();
  if (window.AppStore && window.AppStore.initThemeToggle) window.AppStore.initThemeToggle();
  if (window.AppStore && window.AppStore.updateCartUI) window.AppStore.updateCartUI();
  document.getElementById('footer-mount').innerHTML = getFooterHTML();
  // Inject messenger FAB
  var fabRoot = document.getElementById('messenger-fab-root');
  if (fabRoot && typeof getMessengerFAB === 'function') { fabRoot.innerHTML = getMessengerFAB(); initMessengerFAB(); }

    document.title = meta.title + ' — VanVek';
    document.getElementById('page-h1').textContent = meta.title;
    document.getElementById('page-desc-text').textContent = meta.desc;
    document.getElementById('bc-label').textContent = meta.title;

});

<script>
document.addEventListener('DOMContentLoaded', function() {
  var form = document.getElementById('task-form');
  if (!form) return;
  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = document.getElementById('task-submit-btn');
    var name = form.querySelector('[name="name"]').value.trim();
    var phone = form.querySelector('[name="phone"]').value.trim();
    var task = form.querySelector('[name="task"]').value.trim();
    if (!name || !phone || !task) return;
    btn.disabled = true;
    btn.textContent = 'Отправка...';
    var reqNum = 'TASK-' + Date.now().toString(36).toUpperCase();
    fetch('https://formsubmit.co/ajax/sc.vanvek@gmail.com', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({
        _subject: 'Новая задача ' + reqNum + ' — VanVek',
        'Заявка': reqNum,
        'Имя': name,
        'Телефон': phone,
        'Описание задачи': task,
        _template: 'table'
      })
    })
    .then(function(res) { return res.json(); })
    .then(function() {
      form.style.display = 'none';
      document.getElementById('task-success').style.display = 'block';
    })
    .catch(function() {
      alert('Ошибка отправки. Позвоните нам: 8 800 333-33-33');
      btn.disabled = false;
      btn.textContent = 'Отправить';
    });
  });
});

    if (!window.AppStore) return;
    var count = window.AppStore.cartCount();
    document.querySelectorAll('.mobile-bottom-bar .js-cart-count').forEach(function(el) {
      el.textContent = count;
      el.style.display = count > 0 ? '' : 'none';
    });

});
